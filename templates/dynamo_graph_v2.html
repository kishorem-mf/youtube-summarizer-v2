<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Graph Explorer</title>
  <style>
    :root {
      --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --fg:#e7e9ee;
      --mut:#9aa3b2; --accent:#ff4d4f; --good:#3ecf8e; --warn:#f5a623;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* ── Nav (reuse app styles) ─────────────────────────────── */
    .app-shell-header { background:var(--card); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:0; padding:0 24px; height:52px; flex-shrink:0; }
    .brand { display:flex; align-items:center; gap:8px; margin-right:32px; }
    .brand-icon { font-size:20px; }
    .brand-name { font-size:15px; font-weight:600; color:var(--fg); white-space:nowrap; }
    .app-tabs { display:flex; gap:0; height:100%; }
    .app-tab { display:flex; align-items:center; padding:0 18px; font-size:14px; color:var(--mut); text-decoration:none; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap; }
    .app-tab:hover { color:var(--fg); }
    .app-tab.active { color:var(--fg); border-bottom-color:var(--accent); font-weight:600; }

    /* ── Main 3-column shell ────────────────────────────────── */
    .graph-shell { display:flex; flex:1; overflow:hidden; }

    /* ── Filter panel ───────────────────────────────────────── */
    .filter-panel {
      width:240px; flex-shrink:0; background:var(--card);
      border-right:1px solid var(--line); overflow-y:auto;
      padding:16px 14px; display:flex; flex-direction:column; gap:16px;
    }
    .filter-panel h2 { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--mut); margin-bottom:8px; }
    .filter-section { display:flex; flex-direction:column; gap:6px; }
    .chk-row { display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; }
    .chk-row input { accent-color:var(--accent); cursor:pointer; }
    select.multi {
      width:100%; background:#0f1115; border:1px solid var(--line); color:var(--fg);
      border-radius:6px; padding:6px 8px; font-size:12px; min-height:90px;
    }
    select.multi:focus { outline:none; border-color:var(--accent); }
    .tag-input-row { display:flex; gap:6px; }
    .tag-input-row input {
      flex:1; background:#0f1115; border:1px solid var(--line); color:var(--fg);
      border-radius:6px; padding:6px 8px; font-size:12px;
    }
    .tag-input-row input:focus { outline:none; border-color:var(--accent); }
    .btn-xs { background:var(--line); color:var(--mut); border:0; border-radius:5px; padding:5px 9px; font-size:12px; cursor:pointer; }
    .btn-xs:hover { color:var(--fg); background:#3a4050; }
    .btn-apply { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:8px 0; font-size:13px; font-weight:600; cursor:pointer; width:100%; }
    .btn-apply:hover { opacity:.85; }
    .btn-reset { background:var(--line); color:var(--mut); border:0; border-radius:6px; padding:7px 0; font-size:13px; cursor:pointer; width:100%; }
    .btn-reset:hover { color:var(--fg); }

    /* stats chips */
    .stat-chips { display:flex; flex-wrap:wrap; gap:5px; }
    .stat-chip { background:var(--line); color:var(--mut); border-radius:10px; padding:2px 8px; font-size:11px; }
    .stat-chip span { color:var(--fg); font-weight:600; }

    /* ── Graph canvas ───────────────────────────────────────── */
    .graph-canvas { flex:1; position:relative; overflow:hidden; }
    svg#graph { width:100%; height:100%; display:block; }

    /* graph controls overlay */
    .graph-controls {
      position:absolute; top:12px; right:12px;
      display:flex; gap:6px; align-items:center;
    }
    .ctrl-btn {
      background:var(--card); color:var(--mut); border:1px solid var(--line);
      border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer;
    }
    .ctrl-btn:hover { color:var(--fg); border-color:var(--mut); }
    .ctrl-btn.active { color:var(--fg); border-color:var(--accent); }

    #spinner {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:13px; color:var(--mut); display:none;
    }
    #spinner.show { display:block; }
    #graph-empty {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      color:var(--mut); font-size:14px; text-align:center; display:none;
    }

    /* tooltip */
    #tooltip {
      position:fixed; background:#1e2330; border:1px solid var(--line);
      border-radius:8px; padding:8px 12px; font-size:12px; pointer-events:none;
      opacity:0; transition:opacity .15s; max-width:220px; z-index:999;
    }
    #tooltip.show { opacity:1; }
    #tooltip .tt-label { font-weight:600; color:var(--fg); margin-bottom:3px; }
    #tooltip .tt-meta { color:var(--mut); }

    /* ── Detail panel ───────────────────────────────────────── */
    .detail-panel {
      width:320px; flex-shrink:0; background:var(--card);
      border-left:1px solid var(--line); overflow-y:auto;
      padding:18px 16px; display:flex; flex-direction:column; gap:12px;
    }
    .detail-placeholder { color:var(--mut); font-size:13px; text-align:center; margin-top:60px; }
    .detail-badge {
      display:inline-block; border-radius:20px; padding:2px 10px;
      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    }
    .badge-youtube       { background:#3a1a1a; color:#ff4d4f; }
    .badge-linkedin_post { background:#2a1a3a; color:#a78bfa; }
    .badge-google_search { background:#1a2f2f; color:#2dd4bf; }
    .detail-title { font-size:14px; font-weight:600; color:var(--fg); line-height:1.4; }
    .detail-author { font-size:12px; color:var(--mut); }
    .detail-date { font-size:12px; color:var(--mut); }
    .detail-stats { display:flex; gap:10px; flex-wrap:wrap; }
    .detail-stat { font-size:12px; color:var(--mut); }
    .detail-stat strong { color:var(--fg); }
    .detail-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .dtag {
      background:#2a2f3a; color:var(--warn); border-radius:4px; padding:2px 7px;
      font-size:11px; font-weight:600; cursor:pointer; border:1px solid transparent;
    }
    .dtag:hover { border-color:var(--warn); }
    .detail-st { font-size:12px; color:var(--mut); }
    .detail-st strong { color:var(--fg); }
    .detail-summary {
      font-size:12px; color:var(--fg); line-height:1.6;
      max-height:280px; overflow-y:auto;
      background:#0f1115; border-radius:6px; padding:10px 12px;
      border:1px solid var(--line);
    }
    .btn-open {
      display:inline-block; background:var(--line); color:var(--fg);
      border:0; border-radius:6px; padding:8px 14px; font-size:12px;
      text-decoration:none; font-weight:600; cursor:pointer;
    }
    .btn-open:hover { background:#3a4050; }
    .detail-divider { border:0; border-top:1px solid var(--line); }
  </style>
</head>
<body>

{% include '_nav.html' %}

<div class="graph-shell">

  <!-- ── Filter Panel ─────────────────────────────────────── -->
  <aside class="filter-panel">
    <div>
      <h2>Platform</h2>
      <div class="filter-section">
        <label class="chk-row"><input type="checkbox" id="chk-yt"  value="youtube"       checked> YouTube</label>
        <label class="chk-row"><input type="checkbox" id="chk-li"  value="linkedin_post"  checked> LinkedIn</label>
        <label class="chk-row"><input type="checkbox" id="chk-gs"  value="google_search"  checked> Google</label>
      </div>
    </div>

    <div>
      <h2>Search Term</h2>
      <select id="sel-term" class="multi" multiple size="6">
        {% for st in meta.search_terms %}
        <option value="{{ st }}">{{ st }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <h2>Tag</h2>
      <div class="tag-input-row">
        <input type="text" id="inp-tag" placeholder="filter by tag…">
        <button class="btn-xs" id="btn-tag-clear">✕</button>
      </div>
    </div>

    <div class="stat-chips" id="graph-stats">
      <span class="stat-chip">nodes: <span id="stat-nodes">–</span></span>
      <span class="stat-chip">edges: <span id="stat-edges">–</span></span>
      <span class="stat-chip">articles: <span id="stat-arts">–</span></span>
    </div>

    <button class="btn-apply" id="btn-apply">Apply Filters</button>
    <button class="btn-reset" id="btn-reset">Reset</button>
  </aside>

  <!-- ── Graph Canvas ──────────────────────────────────────── -->
  <div class="graph-canvas" id="graph-wrap">
    <svg id="graph">
      <defs>
        <marker id="arr-term-tag" markerWidth="8" markerHeight="8" refX="16" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#3b82f688"/>
        </marker>
        <marker id="arr-tag-art" markerWidth="8" markerHeight="8" refX="12" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#ffffff33"/>
        </marker>
      </defs>
      <g id="zoom-layer"></g>
    </svg>
    <div id="spinner">Loading graph…</div>
    <div id="graph-empty">No nodes match the current filters.</div>
    <div class="graph-controls">
      <button class="ctrl-btn" id="btn-fit">Fit</button>
      <button class="ctrl-btn" id="btn-labels">Labels</button>
    </div>
  </div>

  <!-- ── Detail Panel ──────────────────────────────────────── -->
  <aside class="detail-panel" id="detail-panel">
    <p class="detail-placeholder">Click a node to see details</p>
  </aside>

</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-meta"  id="tt-meta"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────
let simulation = null;
let currentData = { nodes: [], links: [] };
let showLabels = true;
let highlighted = null;   // set of highlighted node ids

// ── Colour helpers ───────────────────────────────────────────
const PLAT_COLOR = {
  youtube:       "#ff4d4f",
  linkedin_post: "#a78bfa",
  google_search: "#2dd4bf",
};
function nodeColor(d) {
  if (d.type === "search_term") return "#3b82f6";
  if (d.type === "tag")         return "#f59e0b";
  return PLAT_COLOR[d.platform] || "#9aa3b2";
}
function nodeRadius(d) {
  if (d.type === "search_term") return 22;
  if (d.type === "tag")         return 14;
  return 8;
}

// ── Filters ──────────────────────────────────────────────────
function getFilters() {
  const platforms = ["chk-yt","chk-li","chk-gs"]
    .filter(id => document.getElementById(id).checked)
    .map(id => document.getElementById(id).value);
  const termSel = document.getElementById("sel-term");
  const terms = [...termSel.selectedOptions].map(o => o.value);
  const tag = document.getElementById("inp-tag").value.trim();
  return { platforms, terms, tag };
}

function buildQueryString(f) {
  const params = new URLSearchParams();
  // If not all platforms checked, send the checked ones as multiple params
  if (f.platforms.length < 3 && f.platforms.length > 0) {
    f.platforms.forEach(p => params.append("platform", p));
  }
  if (f.terms.length === 1) params.set("search_term", f.terms[0]);
  if (f.tag) params.set("tag", f.tag);
  return params.toString() ? "?" + params.toString() : "";
}

// ── Fetch + Render ───────────────────────────────────────────
async function fetchGraph(qs = "") {
  showSpinner(true);
  hideEmpty();
  try {
    const r = await fetch("/graph/data" + qs);
    const data = await r.json();
    // Client-side platform filter (API only supports single platform; we do multi here)
    const f = getFilters();
    if (f.platforms.length < 3) {
      data.nodes = data.nodes.filter(n => n.type !== "article" || f.platforms.includes(n.platform));
      const keep = new Set(data.nodes.map(n => n.id));
      data.links = data.links.filter(l => keep.has(l.source) && keep.has(l.target));
      // Remove orphan tag/term nodes
      const linked = new Set();
      data.links.forEach(l => { linked.add(l.source); linked.add(l.target); });
      data.nodes = data.nodes.filter(n => n.type === "article" || linked.has(n.id));
    }
    currentData = data;
    renderGraph(data);
  } catch(e) {
    console.error(e);
  } finally {
    showSpinner(false);
  }
}

function renderGraph(data) {
  const wrap = document.getElementById("graph-wrap");
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const svg = d3.select("#graph");
  const layer = svg.select("#zoom-layer");
  layer.selectAll("*").remove();

  if (!data.nodes.length) { showEmpty(true); return; }
  showEmpty(false);

  // Update stats
  document.getElementById("stat-nodes").textContent = data.nodes.length;
  document.getElementById("stat-edges").textContent = data.links.length;
  document.getElementById("stat-arts").textContent  = data.nodes.filter(n=>n.type==="article").length;

  // Deep-copy nodes/links so D3 can mutate them
  const nodes = data.nodes.map(d => ({...d}));
  const links = data.links.map(d => ({...d}));

  // Build adjacency for highlight
  const adjNodes = new Map(); // nodeId -> Set of connected nodeIds
  const adjLinks = new Map(); // nodeId -> Set of link indices
  nodes.forEach(n => { adjNodes.set(n.id, new Set()); adjLinks.set(n.id, new Set()); });
  links.forEach((l, i) => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    adjNodes.get(s)?.add(t);
    adjNodes.get(t)?.add(s);
    adjLinks.get(s)?.add(i);
    adjLinks.get(t)?.add(i);
  });

  // Zoom
  const zoom = d3.zoom().scaleExtent([0.05, 4]).on("zoom", e => {
    layer.attr("transform", e.transform);
  });
  svg.call(zoom);
  svg.on("click.reset", (e) => {
    if (e.target === svg.node() || e.target.tagName === "svg") resetHighlight();
  });

  // Simulation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => d.type === "term_tag" ? 120 : 60).strength(0.8))
    .force("charge", d3.forceManyBody().strength(d => d.type === "search_term" ? -600 : d.type === "tag" ? -200 : -80))
    .force("collide", d3.forceCollide().radius(d => nodeRadius(d) + 4))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("x", d3.forceX(W / 2).strength(0.03))
    .force("y", d3.forceY(H / 2).strength(0.03));

  // Edges
  const linkSel = layer.append("g").attr("class","links")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("stroke", d => d.type === "term_tag" ? "#3b82f688" : "#ffffff22")
    .attr("stroke-width", d => d.type === "term_tag" ? 1.5 : 1)
    .attr("marker-end", d => d.type === "term_tag" ? "url(#arr-term-tag)" : "url(#arr-tag-art)");

  // Node groups
  const nodeSel = layer.append("g").attr("class","nodes")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("class", d => `node node-${d.type}`)
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", dragStart)
      .on("drag",  dragged)
      .on("end",   dragEnd));

  nodeSel.append("circle")
    .attr("r", d => nodeRadius(d))
    .attr("fill", d => nodeColor(d))
    .attr("stroke", "#ffffff22")
    .attr("stroke-width", 1);

  // Labels
  const labelSel = nodeSel.append("text")
    .attr("class","node-label")
    .attr("dy", d => d.type === "search_term" ? -26 : d.type === "tag" ? -18 : -12)
    .attr("text-anchor","middle")
    .attr("fill", "#e7e9ee")
    .attr("font-size", d => d.type === "search_term" ? "11px" : "10px")
    .attr("font-weight", d => d.type === "search_term" ? "700" : "400")
    .attr("pointer-events","none")
    .text(d => d.label.length > 28 ? d.label.slice(0,26)+"…" : d.label)
    .style("display", d => (d.type === "search_term" || showLabels) ? "block" : "none");

  // Tooltip
  const tooltip = document.getElementById("tooltip");
  const ttLabel = document.getElementById("tt-label");
  const ttMeta  = document.getElementById("tt-meta");

  nodeSel
    .on("mouseover", (e, d) => {
      ttLabel.textContent = d.label;
      let meta = d.type;
      if (d.type === "search_term") meta += ` · ${d.count} articles`;
      else if (d.type === "tag")    meta += ` · ${d.count} articles`;
      else                          meta += ` · ${d.platform || ""}`;
      ttMeta.textContent = meta;
      tooltip.classList.add("show");
    })
    .on("mousemove", (e) => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top  = (e.clientY - 10) + "px";
    })
    .on("mouseleave", () => tooltip.classList.remove("show"))
    .on("click", (e, d) => {
      e.stopPropagation();
      highlightNode(d, nodeSel, linkSel, labelSel, adjNodes, adjLinks, links);
      if (d.type === "article") {
        const vid = d.video_id || d.id.replace("art::", "");
        showDetail(vid, d);
      }
    });

  // Tag-label hover show/hide
  nodeSel.filter(d => d.type === "tag")
    .on("mouseover.label", (e, d) => {
      d3.select(e.currentTarget).select("text").style("display","block");
    })
    .on("mouseleave.label", (e, d) => {
      if (!showLabels) d3.select(e.currentTarget).select("text").style("display","none");
    });

  simulation.on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // Fit on first render
  simulation.on("end", () => fitGraph(zoom, svg, layer, W, H));

  // Store refs for controls
  window._graphRefs = { zoom, svg, layer, nodeSel, linkSel, labelSel, W, H };

  function dragStart(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
}

function highlightNode(d, nodeSel, linkSel, labelSel, adjNodes, adjLinks, links) {
  const connectedNodes = new Set([d.id]);

  if (d.type === "article") {
    // highlight article + its tags + tags' search_terms
    adjNodes.get(d.id)?.forEach(nid => {
      connectedNodes.add(nid);
      adjNodes.get(nid)?.forEach(nid2 => {
        const n2 = currentData.nodes.find(n => n.id === nid2);
        if (n2 && n2.type === "search_term") connectedNodes.add(nid2);
      });
    });
  } else if (d.type === "tag") {
    connectedNodes.add(d.id);
    adjNodes.get(d.id)?.forEach(nid => {
      connectedNodes.add(nid);
      // also add search_terms connected to this tag
      const n = currentData.nodes.find(n => n.id === nid);
      if (n && n.type === "search_term") connectedNodes.add(nid);
    });
  } else if (d.type === "search_term") {
    connectedNodes.add(d.id);
    // add all tags and their articles
    adjNodes.get(d.id)?.forEach(tagId => {
      connectedNodes.add(tagId);
      adjNodes.get(tagId)?.forEach(artId => connectedNodes.add(artId));
    });
  }

  const connectedLinks = new Set();
  links.forEach((l, i) => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    if (connectedNodes.has(s) && connectedNodes.has(t)) connectedLinks.add(i);
  });

  nodeSel.select("circle")
    .attr("opacity", n => connectedNodes.has(n.id) ? 1 : 0.12);
  nodeSel.select("text")
    .attr("opacity", n => connectedNodes.has(n.id) ? 1 : 0.08);
  linkSel
    .attr("opacity", (l, i) => connectedLinks.has(i) ? 1 : 0.05);

  highlighted = d.id;
}

function resetHighlight() {
  highlighted = null;
  if (!window._graphRefs) return;
  const { nodeSel, linkSel } = window._graphRefs;
  nodeSel.select("circle").attr("opacity", 1);
  nodeSel.select("text").attr("opacity", 1);
  linkSel.attr("opacity", 1);
  document.getElementById("detail-panel").innerHTML =
    '<p class="detail-placeholder">Click a node to see details</p>';
}

function fitGraph(zoom, svg, layer, W, H) {
  const bounds = layer.node().getBBox();
  if (!bounds.width || !bounds.height) return;
  const scale = Math.min(0.95, Math.min(W / bounds.width, H / bounds.height)) * 0.85;
  const tx = W / 2 - scale * (bounds.x + bounds.width / 2);
  const ty = H / 2 - scale * (bounds.y + bounds.height / 2);
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

async function showDetail(videoId, nodeData) {
  const panel = document.getElementById("detail-panel");
  panel.innerHTML = '<p class="detail-placeholder">Loading…</p>';
  try {
    const r = await fetch(`/graph/node/${encodeURIComponent(videoId)}`);
    const d = await r.json();
    if (d.error) { panel.innerHTML = `<p class="detail-placeholder">${d.error}</p>`; return; }

    const plat = d.source_platform || nodeData.platform || "youtube";
    const platLabel = { youtube:"YouTube", linkedin_post:"LinkedIn", google_search:"Google" }[plat] || plat;
    const tags = (d.tags || []).map(t =>
      `<span class="dtag" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">&#35;${t}</span>`
    ).join(" ");
    const stats = plat === "youtube"
      ? `<span class="detail-stat"><strong>${(d.views||0).toLocaleString()}</strong> views</span>
         <span class="detail-stat"><strong>${(d.comments||0).toLocaleString()}</strong> comments</span>`
      : `<span class="detail-stat"><strong>${(d.likes||0).toLocaleString()}</strong> likes</span>
         <span class="detail-stat"><strong>${(d.comments||0).toLocaleString()}</strong> comments</span>`;

    panel.innerHTML = `
      <span class="detail-badge badge-${plat}">${platLabel}</span>
      <div class="detail-title">${escHtml(d.title || nodeData.label || "")}</div>
      ${d.author ? `<div class="detail-author">${escHtml(d.author)}</div>` : ""}
      ${d.date   ? `<div class="detail-date">${escHtml(String(d.date))}</div>` : ""}
      <div class="detail-stats">${stats}</div>
      ${tags ? `<div class="detail-tags">${tags}</div>` : ""}
      ${d.search_term ? `<div class="detail-st">Topic: <strong>${escHtml(d.search_term)}</strong></div>` : ""}
      <hr class="detail-divider">
      ${d.summary ? `<div class="detail-summary">${escHtml(d.summary)}</div>` : '<div class="detail-placeholder">No summary.</div>'}
      ${d.url ? `<a class="btn-open" href="${escHtml(d.url)}" target="_blank" rel="noopener">Open source ↗</a>` : ""}
    `;
  } catch(e) {
    panel.innerHTML = `<p class="detail-placeholder">Failed to load: ${e.message}</p>`;
  }
}

function filterByTag(tag) {
  document.getElementById("inp-tag").value = tag;
  applyFilters();
}

function applyFilters() {
  const f = getFilters();
  const qs = buildQueryString(f);
  fetchGraph(qs);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function showSpinner(v) {
  document.getElementById("spinner").classList.toggle("show", v);
}
function showEmpty(v) {
  document.getElementById("graph-empty").style.display = v ? "block" : "none";
}
function hideEmpty() {
  document.getElementById("graph-empty").style.display = "none";
}

// ── Controls ─────────────────────────────────────────────────
document.getElementById("btn-fit").addEventListener("click", () => {
  if (!window._graphRefs) return;
  const { zoom, svg, layer, W, H } = window._graphRefs;
  fitGraph(zoom, svg, layer, W, H);
});

document.getElementById("btn-labels").addEventListener("click", function() {
  showLabels = !showLabels;
  this.classList.toggle("active", showLabels);
  if (!window._graphRefs) return;
  const { nodeSel } = window._graphRefs;
  nodeSel.select("text")
    .style("display", d => (d.type === "search_term" || showLabels) ? "block" : "none");
});

document.getElementById("btn-apply").addEventListener("click", applyFilters);

document.getElementById("btn-reset").addEventListener("click", () => {
  document.getElementById("chk-yt").checked  = true;
  document.getElementById("chk-li").checked  = true;
  document.getElementById("chk-gs").checked  = true;
  document.getElementById("sel-term").selectedIndex = -1;
  document.getElementById("inp-tag").value = "";
  fetchGraph();
});

document.getElementById("btn-tag-clear").addEventListener("click", () => {
  document.getElementById("inp-tag").value = "";
});

document.getElementById("inp-tag").addEventListener("keydown", e => {
  if (e.key === "Enter") applyFilters();
});

// ── Boot ─────────────────────────────────────────────────────
fetchGraph();
</script>
</body>
</html>
